version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: retailiq-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retailiq

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: retailiq-backend

    ports:
      - "8000:8000"

    depends_on:
      - postgres

    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend

    container_name: retailiq-frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

volumes:
  postgres_data: